# nginx/default.conf
# Handles: HTTP, WebSocket (/ws/), static, media

upstream django_asgi {
    server web:8000;
}

server {
    listen 80;
    server_name _;       

    client_max_body_size 20M;

    # Static files served directly by Nginx (faster than Django)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # WebSocket — Django Channels
    location /ws/ {
        proxy_pass http://django_asgi;
        proxy_http_version 1.1;

        # These two headers upgrade HTTP → WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;       # keep WS alive 24h
        proxy_send_timeout 86400;
    }

    # All other requests → Django app
    location / {
        proxy_pass http://django_asgi;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}